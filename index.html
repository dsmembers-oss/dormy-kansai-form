<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>共立メンテナンス 学生寮アンケート</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:#f0f0f0;display:flex;justify-content:center}
.container{width:100%;max-width:440px;background:#fff;min-height:100vh}
.header{text-align:center;padding:32px 20px 0}
.logo{font-size:22px;font-weight:800;color:#06C755;letter-spacing:2px}
.subtitle{font-size:14px;color:#666;margin-top:6px;margin-bottom:16px}
.header-line{height:3px;background:linear-gradient(90deg,#06C755,#04B34A);border-radius:2px;margin:0 20px}
.form-body{padding:28px 24px 40px}
.field{margin-bottom:24px}
.field.sub{margin-bottom:12px}
label.field-label{display:block;font-size:15px;font-weight:700;color:#333;margin-bottom:8px}
label.sub-label{display:block;font-size:13px;font-weight:600;color:#555;margin-bottom:6px}
.required{color:#E74C3C;font-weight:700;font-size:14px}
input[type="text"],input[type="tel"],input[type="email"],.select-wrap select{width:100%;padding:14px 16px;font-size:15px;border:1.5px solid #ddd;border-radius:10px;outline:none;background:#FAFAFA;transition:border-color .2s;color:#333;font-family:inherit}
input:focus,select:focus{border-color:#06C755!important}
.hint{font-size:12px;color:#999;margin-top:6px;line-height:1.5}
.btn-group{display:grid;gap:8px}
.btn-group.cols-4{grid-template-columns:repeat(4,1fr)}
.btn-group.cols-2{grid-template-columns:repeat(2,1fr)}
.opt-btn{padding:12px 4px;font-size:13px;font-weight:600;border:1.5px solid #ddd;border-radius:10px;background:#FAFAFA;color:#555;cursor:pointer;transition:all .15s;text-align:center;font-family:inherit}
.opt-btn:hover{border-color:#aaa}
.opt-btn.active{border:2px solid #06C755;background:#E8F9EE;color:#06C755;font-weight:700}
.sub-section{background:#F7FBF7;border-left:3px solid #06C755;border-radius:0 10px 10px 0;padding:16px 16px 8px;margin-bottom:24px;margin-top:-8px}
.add-btn{display:block;width:100%;padding:10px;font-size:13px;color:#06C755;background:transparent;border:1.5px dashed #06C755;border-radius:8px;cursor:pointer;font-weight:600;margin-bottom:8px;font-family:inherit}
.add-btn:hover{background:#f0faf3}
.select-wrap{position:relative}
.select-wrap select{appearance:none;cursor:pointer;padding-right:36px}
.select-wrap::after{content:'▼';position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:12px;color:#999;pointer-events:none}
.submit-btn{width:100%;padding:16px;font-size:17px;font-weight:700;color:#fff;background:linear-gradient(135deg,#06C755,#04A648);border:none;border-radius:12px;cursor:pointer;margin-top:16px;box-shadow:0 4px 14px rgba(6,199,85,.3);transition:opacity .2s;letter-spacing:2px;font-family:inherit}
.submit-btn:hover{opacity:.85}
.footer{text-align:center;font-size:11px;color:#bbb;margin-top:24px}
.hidden{display:none}
.autocomplete-wrap{position:relative}
.autocomplete-wrap input{padding-left:40px!important}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;color:#bbb;pointer-events:none;z-index:1}
.dropdown{position:absolute;top:100%;left:0;right:0;max-height:200px;overflow-y:auto;background:#fff;border:1.5px solid #06C755;border-radius:10px;margin-top:4px;z-index:100;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.dropdown-item{padding:12px 16px;font-size:14px;color:#333;cursor:pointer;border-bottom:1px solid #f0f0f0;transition:background .1s}
.dropdown-item:hover{background:#E8F9EE}
.dropdown-item .hl{color:#06C755;font-weight:700}
.dropdown-empty{padding:14px 16px;color:#999;font-size:13px}
.done-wrap{text-align:center;padding:60px 20px}
.done-icon{font-size:48px;margin-bottom:16px}
.done-title{font-size:18px;font-weight:700;color:#333;margin-bottom:8px}
.done-text{font-size:14px;color:#888;line-height:1.6}
</style>
</head>
<body>

<div class="container" id="app">
  <div class="header">
    <div class="logo">共立メンテナンス</div>
    <div class="subtitle">学生寮に関するアンケート</div>
    <div class="header-line"></div>
  </div>

  <div class="form-body" id="formBody">

    <!-- お名前 -->
    <div class="field">
      <label class="field-label">お名前 <span class="required">*</span></label>
      <input type="text" id="name" placeholder="山田 太郎">
      <div class="hint">※LINEのお名前が自動で入力されます。変更することも可能です。</div>
    </div>

    <!-- 学年 -->
    <div class="field">
      <label class="field-label">現在の学年 <span class="required">*</span></label>
      <div class="btn-group cols-4" id="gradeGroup">
        <button class="opt-btn" data-val="1年生">1年生</button>
        <button class="opt-btn" data-val="2年生">2年生</button>
        <button class="opt-btn" data-val="3年生">3年生</button>
        <button class="opt-btn" data-val="高卒生">高卒生</button>
      </div>
    </div>

    <!-- 友だち追加経路 -->
    <div class="field">
      <label class="field-label">どうやって友だち追加してくれましたか？ <span class="required">*</span></label>
      <div class="btn-group cols-2" id="sourceGroup">
        <button class="opt-btn" data-val="見学">見学</button>
        <button class="opt-btn" data-val="体験入寮">体験入寮</button>
        <button class="opt-btn" data-val="オープンキャンパス">オープンキャンパス</button>
        <button class="opt-btn" data-val="Webサイト">Webサイト</button>
        <button class="opt-btn" data-val="チラシ">チラシ</button>
        <button class="opt-btn" data-val="その他">その他</button>
      </div>
    </div>

    <!-- 見学サブ -->
    <div class="sub-section hidden" id="subVisit">
      <div class="field">
        <label class="field-label">どの会館に見学に行きましたか？ <span class="required">*</span></label>
        <div class="select-wrap"><select id="visitHall1"><option value="" disabled selected>会館を選択</option></select></div>
      </div>
      <button class="add-btn hidden" id="addHall2Btn" onclick="showHall2()">＋ 他にも見学した会館がある場合</button>
      <div class="field sub hidden" id="hall2Field">
        <label class="sub-label">2つ目の見学会館</label>
        <div class="select-wrap"><select id="visitHall2"><option value="" disabled selected>会館を選択（任意）</option></select></div>
      </div>
      <button class="add-btn hidden" id="addHall3Btn" onclick="showHall3()">＋ さらに追加</button>
      <div class="field sub hidden" id="hall3Field">
        <label class="sub-label">3つ目の見学会館</label>
        <div class="select-wrap"><select id="visitHall3"><option value="" disabled selected>会館を選択（任意）</option></select></div>
      </div>
    </div>

    <!-- 体験入寮サブ -->
    <div class="sub-section hidden" id="subTrial">
      <div class="field">
        <label class="field-label">どの会館に体験入寮しましたか？ <span class="required">*</span></label>
        <div class="select-wrap"><select id="trialHall"><option value="" disabled selected>会館を選択</option></select></div>
      </div>
      <div class="field sub">
        <label class="sub-label">その他に見学した会館</label>
        <input type="text" id="otherVisited" placeholder="例：ドーミー江坂（任意）">
      </div>
    </div>

    <!-- オープンキャンパスサブ -->
    <div class="sub-section hidden" id="subOC">
      <div class="field">
        <label class="field-label">参加した学校名 <span class="required">*</span></label>
        <div class="autocomplete-wrap" id="acOC">
          <span class="search-icon">🔍</span>
          <input type="text" id="ocSchool" placeholder="学校名を入力" autocomplete="off">
          <div class="dropdown hidden" id="dropOC"></div>
        </div>
      </div>
    </div>

    <!-- その他サブ -->
    <div class="sub-section hidden" id="subOther">
      <div class="field">
        <label class="field-label">詳しく教えてください <span class="required">*</span></label>
        <input type="text" id="otherSource" placeholder="例：友人の紹介、SNSなど">
      </div>
    </div>

    <!-- 志望校 -->
    <div class="field">
      <label class="field-label">現時点で希望している学校名 <span class="required">*</span></label>
      <div class="autocomplete-wrap" id="acSchool">
        <span class="search-icon">🔍</span>
        <input type="text" id="schoolName" placeholder="学校名を入力すると候補が表示されます" autocomplete="off">
        <div class="dropdown hidden" id="dropSchool"></div>
      </div>
      <div class="hint">※受験前・合格前でも現時点の希望で大丈夫です。</div>
    </div>

    <!-- 合格時期 -->
    <div class="field">
      <label class="field-label">合格が決まる時期（予定） <span class="required">*</span></label>
      <div class="select-wrap">
        <select id="admissionTiming">
          <option value="" disabled selected>時期を選択</option>
          <option>4月頃</option><option>5月頃</option><option>6月頃</option><option>7月頃</option>
          <option>8月頃</option><option>9月頃</option><option>10月頃</option><option>11月頃</option>
          <option>12月頃</option><option>1月頃</option><option>2月頃</option><option>3月頃</option>
        </select>
      </div>
    </div>

    <!-- 興味ある会館 -->
    <div class="field">
      <label class="field-label">興味のある会館</label>
      <div class="select-wrap"><select id="interestedHall"><option value="" disabled selected>会館を選択（任意）</option></select></div>
    </div>

    <!-- 電話番号 -->
    <div class="field">
      <label class="field-label">電話番号 <span class="required">*</span></label>
      <input type="tel" id="phone" placeholder="090-1234-5678">
      <div class="hint">※できれば保護者様の番号をご入力ください。ご本人の番号でも構いません。</div>
    </div>

    <!-- メールアドレス -->
    <div class="field">
      <label class="field-label">メールアドレス <span class="required">*</span></label>
      <input type="email" id="email" placeholder="example@mail.com">
    </div>

    <button class="submit-btn" onclick="submitForm()">アンケートを送信</button>
    <div class="footer">Powered by プリ・テック</div>
  </div>

  <!-- 完了画面 -->
  <div class="done-wrap hidden" id="doneScreen">
    <div class="done-icon">✅</div>
    <div class="done-title">ご回答ありがとうございました！</div>
    <div class="done-text">いただいた情報をもとに、あなたに合った<br>寮の情報をお届けします。</div>
  </div>
</div>

  });
}

// オートコンプリート
function setupAutocomplete(inputId,dropId){
  var input=document.getElementById(inputId);
  var drop=document.getElementById(dropId);
  input.addEventListener('input',function(){
    var q=this.value.toLowerCase();
    if(!q){drop.classList.add('hidden');return}
    var matches=SCHOOLS.filter(function(s){return s.toLowerCase().indexOf(q)!==-1}).slice(0,20);
    drop.innerHTML='';
    if(matches.length===0){
      drop.innerHTML='<div class="dropdown-empty">該当する学校が見つかりません。直接入力してください。</div>';
    }else{
      matches.forEach(function(s){
        var div=document.createElement('div');
        div.className='dropdown-item';
        var idx=s.toLowerCase().indexOf(q);
        div.innerHTML=escHtml(s.slice(0,idx))+'<span class="hl">'+escHtml(s.slice(idx,idx+q.length))+'</span>'+escHtml(s.slice(idx+q.length));
        div.addEventListener('click',function(){input.value=s;drop.classList.add('hidden')});
        drop.appendChild(div);
      });
    }
    drop.classList.remove('hidden');
  });
  input.addEventListener('focus',function(){if(this.value)this.dispatchEvent(new Event('input'))});
  document.addEventListener('click',function(e){
    if(!e.target.closest('#'+inputId) && !e.target.closest('#'+dropId)){drop.classList.add('hidden')}
  });
}
function escHtml(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
setupAutocomplete('ocSchool','dropOC');
setupAutocomplete('schoolName','dropSchool');
